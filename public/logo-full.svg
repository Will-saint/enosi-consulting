<svg width="400" height="80" viewBox="0 0 400 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Symbole étoile, centré en (30, 40), rayon 22 -->
  <!-- Horizontal -->
  <line x1="8" y1="40" x2="52" y2="40" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Vertical -->
  <line x1="30" y1="18" x2="30" y2="62" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diagonal NW-SE -->
  <line x1="14.4" y1="24.4" x2="45.6" y2="55.6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diagonal NE-SW -->
  <line x1="45.6" y1="24.4" x2="14.4" y2="55.6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Centre -->
  <circle cx="30" cy="40" r="4" fill="none" stroke="white" stroke-width="1.5"/>
  <circle cx="30" cy="40" r="1.8" fill="white"/>

  <!-- ENOSI -->
  <text
    x="66"
    y="36"
    font-family="'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="26"
    font-weight="300"
    letter-spacing="0.18em"
    fill="white"
  >ENOSI</text>

  <!-- Consulting -->
  <text
    x="67"
    y="55"
    font-family="'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="10"
    font-weight="400"
    letter-spacing="0.28em"
    fill="#3ddc84"
  >Consulting</text>
</svg>
