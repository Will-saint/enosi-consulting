<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  canvas { display: block; width: 100%; height: 100%; }
  #error {
    display: none; position: absolute; inset: 0;
    align-items: center; justify-content: center;
    color: rgba(255,255,255,0.4); font-size: 11px;
    font-family: sans-serif; text-align: center; padding: 1rem;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "/three/three.module.js",
    "three/addons/": "/three/"
  }
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="error"></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from '/three/GLTFLoader.js';

const canvas = document.getElementById('c');
const errDiv = document.getElementById('error');

const show = (msg) => {
  errDiv.textContent = msg;
  errDiv.style.display = 'flex';
};

// Renderer
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, 1, 0.01, 200);
camera.position.set(0, 0, 6);

scene.add(new THREE.AmbientLight(0xffffff, 1.5));

const key = new THREE.DirectionalLight(0xfff0d8, 3.0);
key.position.set(5, 8, 6);
scene.add(key);

const fill = new THREE.DirectionalLight(0xd0e8ff, 1.2);
fill.position.set(-5, 2, -4);
scene.add(fill);

const rim = new THREE.PointLight(0xffd0a0, 1.0, 20);
rim.position.set(0, -4, 5);
scene.add(rim);

function resize() {
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  renderer.setSize(W, H, false);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

const loader = new GLTFLoader();
loader.load(
  '/polaroid.gltf',
  (gltf) => {
    const model = gltf.scene;

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const sf = 3.5 / Math.max(size.x, size.y, size.z);

    model.scale.setScalar(sf);
    model.position.set(-center.x * sf, -center.y * sf, -center.z * sf);

    model.traverse((child) => {
      if (child.isMesh) {
        child.material = new THREE.MeshPhysicalMaterial({
          color: 0xF0EBE0,
          roughness: 0.12,
          metalness: 0,
          clearcoat: 0.5,
          clearcoatRoughness: 0.05,
        });
      }
    });

    scene.add(model);

    const baseY = model.position.y;
    let t = 0;
    const animate = () => {
      requestAnimationFrame(animate);
      t += 0.012;
      model.rotation.y += 0.012;
      model.rotation.x = Math.sin(t * 0.35) * 0.07;
      model.rotation.z = Math.sin(t * 0.28) * 0.035;
      model.position.y = baseY + Math.sin(t * 0.45) * 0.08;
      renderer.render(scene, camera);
    };
    animate();
  },
  undefined,
  (err) => show('Erreur chargement modèle')
);
</script>
</body>
</html>
